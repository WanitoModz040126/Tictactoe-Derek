<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Derek Snake Game</title>
<meta name="description" content="Derek Snake Game — a dark, Material 3 styled Snake game." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%226%22 fill=%22%230B0E14%22/><path d=%22M6 12c0-3 2-5 5-5s5 2 5 5-2 5-5 5%22 stroke=%22%234FD6B0%22 stroke-width=%222.4%22 fill=%22none%22 stroke-linecap=%22round%22/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="app-shell">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M5 12c0-3.3 2.2-5.5 5.5-5.5S16 8.7 16 12s-2.2 5.5-5.5 5.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <circle cx="18.2" cy="9.2" r="1.6" fill="currentColor"/>
        </svg>
      </span>
      <div class="brand-text">
        <span class="brand-title">Derek</span>
        <span class="brand-sub">Snake Game</span>
      </div>
    </div>
    <span class="badge">Arcade</span>
  </header>

  <main class="layout">

    <!-- Game board -->
    <section class="board-card" id="boardCard">
      <div class="board-frame">
        <canvas id="gameCanvas" width="480" height="480" aria-label="Snake game board"></canvas>

        <!-- Start / idle layer -->
        <div class="board-overlay" id="startOverlay">
          <div class="overlay-inner">
            <h2>Ready to play?</h2>
            <p>Use <kbd>W A S D</kbd>, the <kbd>arrow keys</kbd>, or the on-screen buttons to move.</p>
            <button class="btn btn-filled" id="startBtn">Start Game</button>
          </div>
        </div>

        <!-- Lose layer -->
        <div class="board-overlay hidden" id="loseOverlay">
          <div class="overlay-inner overlay-card">
            <span class="lose-icon" aria-hidden="true">✕</span>
            <h2>You Lose</h2>
            <p id="loseSummary">Score: 0</p>
            <button class="btn btn-filled" id="retryBtn">Try Again</button>
          </div>
        </div>

        <!-- Video (prank) layer -->
        <div class="board-overlay video-overlay hidden" id="videoOverlay">
          <button class="btn btn-tonal back-btn" id="backBtn">‹ Back</button>
          <video id="loseVideo" playsinline preload="none"></video>
        </div>
      </div>

      <!-- On-screen directional controls -->
      <div class="dpad" id="dpad" aria-label="Movement controls">
        <button class="dpad-btn dpad-up" id="btnUp" aria-label="Move up">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5l7 7h-4v7h-6v-7H5z" fill="currentColor"/></svg>
        </button>
        <button class="dpad-btn dpad-left" id="btnLeft" aria-label="Move left">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 12l7-7v4h7v6h-7v4z" fill="currentColor"/></svg>
        </button>
        <button class="dpad-btn dpad-down" id="btnDown" aria-label="Move down">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 19l-7-7h4V5h6v7h4z" fill="currentColor"/></svg>
        </button>
        <button class="dpad-btn dpad-right" id="btnRight" aria-label="Move right">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 12l-7 7v-4H5V9h7V5z" fill="currentColor"/></svg>
        </button>
      </div>
    </section>

    <!-- Side panel -->
    <aside class="panel">

      <div class="stat-card">
        <div class="stat-row">
          <span class="stat-label">Score</span>
          <span class="stat-value mono" id="scoreValue">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Apples</span>
          <span class="stat-value mono" id="appleValue">0 / 20</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="meter-head">
          <span class="stat-label">Growth</span>
          <span class="stat-value mono" id="meterPercent">0%</span>
        </div>
        <div class="segments" id="segments" aria-hidden="true"></div>
      </div>

      <div class="stat-card hint-card">
        <span class="stat-label">Controls</span>
        <div class="hint-grid">
          <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
        </div>
        <p class="hint-text">Arrow keys and the on-screen buttons also work</p>
      </div>

    </aside>

  </main>

  <footer class="footer">
    <span>Created By Jhon Dherick Pableo Rosal</span>
  </footer>

</div>

<script src="/game.js"></script>
</body>
</html>
